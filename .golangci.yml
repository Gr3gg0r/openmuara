version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - gosec
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unparam
    - unused
  exclusions:
    generated: lax
    paths:
      - web/dashboard/node_modules
      - website/node_modules
      - ".git"

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
