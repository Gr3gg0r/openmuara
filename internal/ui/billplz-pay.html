<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{.CSRFToken}}">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f8fafc" id="theme-color">
  <title>OpenMuara — Simulate Billplz Payment</title>
  <script>
    (function () {
      const key = 'muara-theme';
      const stored = localStorage.getItem(key);
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored === 'light' || stored === 'dark' ? stored : (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      var meta = document.getElementById('theme-color');
      if (meta) meta.content = theme === 'dark' ? '#0f172a' : '#f8fafc';
    })();
  </script>
  <link rel="stylesheet" href="/__muara/payment-pages.css">
</head>
<body>
  <main class="muara-card">
    <div class="muara-header">
      <div class="muara-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 12c2-2 4-2 6 0s4 2 6 0 4-2 6 0 4 2 6 0"/>
          <path d="M2 16c2-2 4-2 6 0s4 2 6 0 4-2 6 0 4 2 6 0"/>
          <path d="M2 8c2-2 4-2 6 0s4 2 6 0 4-2 6 0 4 2 6 0"/>
        </svg>
        OpenMuara
      </div>
      <h1 class="muara-title">Simulate Billplz Payment</h1>
      <p class="muara-subtitle">Pick an outcome to complete the simulated bill.</p>
    </div>

    <div class="muara-body">
      <div class="muara-summary">
        <div class="muara-summary-row">
          <span class="muara-summary-label">Bill ID</span>
          <span class="muara-summary-value" id="id">{{.ID}}</span>
        </div>
        <div class="muara-summary-row">
          <span class="muara-summary-label">Description</span>
          <span class="muara-summary-value" id="description">{{.Description}}</span>
        </div>
        <div class="muara-summary-row">
          <span class="muara-summary-label">Amount</span>
          <span class="muara-summary-value" id="amount">{{.Amount}} sen</span>
        </div>
        <div class="muara-summary-row">
          <span class="muara-summary-label">Environment</span>
          <span class="muara-badge muara-badge--sandbox">Sandbox</span>
        </div>
      </div>

      <form method="POST" action="/_admin/billplz/pay/{{.ID}}">
        <input type="hidden" name="outcome" value="pay" />
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />

        <div class="muara-field">
          <label for="method">Payment method</label>
          <select id="method" name="method" class="muara-select">
            {{range .Methods}}
            <option value="{{.Code}}">{{.Name}}</option>
            {{end}}
          </select>
        </div>

        <div class="muara-actions muara-actions--stack">
          <button type="submit" class="muara-btn muara-btn--success">Simulate Paid</button>
        </div>
      </form>

      <form method="POST" action="/_admin/billplz/pay/{{.ID}}">
        <input type="hidden" name="outcome" value="cancel" />
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />
        <div class="muara-actions muara-actions--stack">
          <button type="submit" class="muara-btn muara-btn--danger">Simulate Cancel</button>
        </div>
      </form>

      <p class="muara-hint">No real FPX or card transaction is processed.</p>
    </div>

    <footer class="muara-footer">
      OpenMuara — local payments, flowing smoothly
    </footer>
  </main>
</body>
</html>
