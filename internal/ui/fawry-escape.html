<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f8fafc" id="theme-color">
  <title>OpenMuara — Simulate Fawry Payment</title>
  <script>
    (function () {
      const key = 'muara-theme';
      const stored = localStorage.getItem(key);
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored === 'light' || stored === 'dark' ? stored : (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      var meta = document.getElementById('theme-color');
      if (meta) meta.content = theme === 'dark' ? '#0f172a' : '#f8fafc';
    })();
  </script>
  <link rel="stylesheet" href="/__muara/payment-pages.css">
</head>
<body>
  <main class="muara-card">
    <div class="muara-header">
      <div class="muara-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 12c2-2 4-2 6 0s4 2 6 0 4-2 6 0 4 2 6 0"/>
          <path d="M2 16c2-2 4-2 6 0s4 2 6 0 4-2 6 0 4 2 6 0"/>
          <path d="M2 8c2-2 4-2 6 0s4 2 6 0 4-2 6 0 4 2 6 0"/>
        </svg>
        OpenMuara
      </div>
      <h1 class="muara-title">Simulate Fawry Payment</h1>
      <p class="muara-subtitle">Choose an outcome to continue the test flow.</p>
    </div>

    <div class="muara-body">
      <div class="muara-summary">
        <div class="muara-summary-row">
          <span class="muara-summary-label">Reference</span>
          <span class="muara-summary-value" id="ref">{{.Ref}}</span>
        </div>
        <div class="muara-summary-row">
          <span class="muara-summary-label">Amount</span>
          <span class="muara-summary-value" id="amount">{{.Amount}} EGP</span>
        </div>
        <div class="muara-summary-row">
          <span class="muara-summary-label">Environment</span>
          <span class="muara-badge muara-badge--sandbox">Sandbox</span>
        </div>
      </div>

      <div class="muara-actions muara-actions--stack">
        <form method="POST" action="/_admin/fawry-escape" class="muara-actions">
          <input type="hidden" name="ref" value="{{.Ref}}" />
          <input type="hidden" name="returnUrl" value="{{.ReturnURL}}" />
          <input type="hidden" name="status" value="PAID" />
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />
          <button type="submit" class="muara-btn muara-btn--success">Simulate Paid</button>
        </form>

        <form method="POST" action="/_admin/fawry-escape" class="muara-actions">
          <input type="hidden" name="ref" value="{{.Ref}}" />
          <input type="hidden" name="returnUrl" value="{{.ReturnURL}}" />
          <input type="hidden" name="status" value="CANCELED" />
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />
          <button type="submit" class="muara-btn muara-btn--danger">Simulate Cancel</button>
        </form>
      </div>

      <p class="muara-hint">No real transaction is processed. This page is part of the OpenMuara local emulator.</p>
    </div>

    <footer class="muara-footer">
      OpenMuara — local payments, flowing smoothly
    </footer>
  </main>
</body>
</html>
