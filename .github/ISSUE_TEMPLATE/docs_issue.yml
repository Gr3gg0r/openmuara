name: Documentation issue
description: Report a docs error, gap, or unclear explanation
title: '[docs] '
labels: ['docs']
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: e.g., docs/quickstart.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
    validations:
      required: false
