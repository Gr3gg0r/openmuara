name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '17 4 * * 1'

permissions: {}

jobs:
  ui-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install UI dependencies
        run: cd web/dashboard && npm ci

      - name: Audit production UI dependencies
        run: cd web/dashboard && npm audit --production

      - name: Build dashboard
        run: cd web/dashboard && npm run build

      - name: Check bundle size
        run: cd web/dashboard && npm run bundle-size

      - name: Upload built dashboard
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dashboard-dist
          path: internal/ui/dashboard-dist/

  ui-test:
    runs-on: ubuntu-latest
    needs: ui-build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install UI dependencies
        run: cd web/dashboard && npm ci

      - name: Run dashboard tests
        run: cd web/dashboard && npm run test:ci

  ui-e2e:
    runs-on: ubuntu-latest
    needs: ui-build
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'

      - name: Download modules
        run: go mod download

      - name: Install UI dependencies
        run: cd web/dashboard && npm ci

      - name: Install Playwright browsers
        run: cd web/dashboard && npx playwright install chromium

      - name: Download built dashboard
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dashboard-dist
          path: internal/ui/dashboard-dist/

      - name: Run dashboard E2E tests
        run: cd web/dashboard && npm run test:e2e

      - name: Run dashboard contrast regression check
        run: cd web/dashboard && npm run a11y:contrast

  lint:
    runs-on: ubuntu-latest
    needs: ui-build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'

      - name: Download modules
        run: go mod download

      - name: gofmt
        run: test -z "$(gofmt -l .)"

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2

  unit:
    runs-on: ubuntu-latest
    needs: ui-build
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'

      - name: Download modules
        run: go mod download

      - name: Download built dashboard
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dashboard-dist
          path: internal/ui/dashboard-dist/

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Enforce 80% coverage
        run: scripts/check-coverage.sh 80

  smoke:
    runs-on: ubuntu-latest
    needs: ui-build
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'

      - name: Download modules
        run: go mod download

      - name: Download built dashboard
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dashboard-dist
          path: internal/ui/dashboard-dist/

      - name: Smoke test
        run: ./scripts/smoke-test.sh

  vuln:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'

      - name: Download modules
        run: go mod download

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'

      - name: Run gosec
        uses: securego/gosec@849570622f56a251c015c0e2417aebafc0216e17 # master
        with:
          args: '-no-fail -fmt sarif -out gosec.sarif ./...'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always()
        with:
          sarif_file: gosec.sarif

  secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    runs-on: ubuntu-latest
    needs: ui-build
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          install-only: true

      - name: Download modules
        run: go mod download

      - name: Install UI dependencies
        run: cd web/dashboard && npm ci

      - name: Download built dashboard
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dashboard-dist
          path: internal/ui/dashboard-dist/

      - name: Full quality matrix
        run: task quality

  docker-build:
    runs-on: ubuntu-latest
    needs: ui-build
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download built dashboard
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dashboard-dist
          path: internal/ui/dashboard-dist/

      - name: Build Docker image
        run: docker build -t openmuara:ci .

      - name: Start container and verify health
        run: |
          docker run -d --name muara-ci -p 127.0.0.1:9000:9000 openmuara:ci
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9000/healthz 2>/dev/null | grep -q '"status":"ok"'; then
              echo "Container is healthy"
              docker rm -f muara-ci
              exit 0
            fi
            sleep 1
          done
          echo "Container did not become healthy" >&2
          docker logs muara-ci
          docker rm -f muara-ci
          exit 1

      - name: Build distroless image
        run: docker build -f Dockerfile.distroless -t openmuara:ci-distroless .

  install-dry-run:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Dry-run install latest
        run: bash scripts/install.sh --dry-run

      - name: Dry-run install pinned version
        run: VERSION=v1.0.0 bash scripts/install.sh --dry-run

      - name: Verify OS/arch detection
        run: |
          bash scripts/install.sh --dry-run 2>&1 | grep -E "OS:\s+(linux|darwin|windows)"
          bash scripts/install.sh --dry-run 2>&1 | grep -E "Arch:\s+(amd64|arm64)"

  changelog-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify VERSION matches changelog section
        run: |
          VERSION="$(cat VERSION)"
          if ! grep -qE "^## \[$VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing a section for $VERSION" >&2
            exit 1
          fi
          echo "CHANGELOG.md has section for $VERSION"
