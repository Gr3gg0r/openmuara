name: Visual Baseline

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'web/dashboard/**'
      - 'internal/ui/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Download modules
        run: go mod download

      - name: Install UI dependencies
        run: cd web/dashboard && npm ci

      - name: Install Playwright browsers
        run: cd web/dashboard && npx playwright install chromium

      - name: Run visual baseline diff
        run: cd web/dashboard && npm run test:visual-baseline
